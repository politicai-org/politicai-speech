name: Deploy to Amazon EC2 (via SSM)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_DIR: "/home/ubuntu/app"
  SECRET_NAME: "candidato-orbe-speech-deploy-key"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::971422696764:role/candidato-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via AWS SSM
        run: |
          INSTANCE_ID="${{ secrets.ORBE_SPEECH_INSTANCE_ID }}"
          PROJECT_DIR="${{ env.PROJECT_DIR }}"

          echo "Deploying to Instance: $INSTANCE_ID"

          COMMAND="
            if [ ! -d $PROJECT_DIR/.git ]; then
              echo '>>> Project directory not found or not a git repo. Cleaning and cloning...'
              sudo rm -rf $PROJECT_DIR
              sudo -u ubuntu git clone git@github.com:TectopiaPeru/colchado-nacion.git $PROJECT_DIR || exit 1
            fi

            cd $PROJECT_DIR || exit 1

            echo '>>> Fetching latest changes...'
            sudo -u ubuntu git fetch --all || exit 1
            echo '>>> Resetting local changes...'
            sudo -u ubuntu git reset --hard origin/main || exit 1

            echo '>>> Rebuilding and restarting Docker containers...'
            cd $PROJECT_DIR/orbe-speech
            sudo -u ubuntu docker compose up -d --build || exit 1
            echo '>>> Pruning old images...'
            sudo -u ubuntu docker image prune -f
            echo '>>> Deployment complete!'
          "

          # Usamos jq para escapar el comando JSON de forma segura
          PAYLOAD=$(jq -n --arg cmd "$COMMAND" --arg id "$INSTANCE_ID" '
          {
            "InstanceIds": [$id],
            "DocumentName": "AWS-RunShellScript",
            "Parameters": {
              "commands": [$cmd]
            }
          }')

          echo "Sending SSM Command..."
          COMMAND_ID=$(aws ssm send-command \
            --cli-input-json "$PAYLOAD" \
            --region ${{ env.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Wait for command execution
          echo "Waiting for execution..."
          STATUS="Pending"
          while [[ "$STATUS" == "Pending" || "$STATUS" == "InProgress" || "$STATUS" == "Delayed" ]]; do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)
            echo "Status: $STATUS"
          done

          # Get Output
          echo "========================================================"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text

          if [ "$STATUS" != "Success" ]; then
            echo "========================================================"
            echo "ERROR OUTPUT:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text
            echo "Deploy Failed with status: $STATUS"
            exit 1
          fi

          echo "Deploy Success!"
