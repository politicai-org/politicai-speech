name: Deploy to Amazon EC2 (via SSM)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_DIR: "/home/ubuntu/app"
  SECRET_NAME: "candidato-orbe-speech-deploy-key"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::971422696764:role/candidato-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via AWS SSM
        timeout-minutes: 15
        run: |
          INSTANCE_ID="${{ secrets.ORBE_SPEECH_INSTANCE_ID }}"
          PROJECT_DIR="${{ env.PROJECT_DIR }}"

          echo "Deploying to Instance: $INSTANCE_ID"

          COMMAND="
            set -e

            echo '>>> Configuring SSH access...'
            sudo -u ubuntu mkdir -p /home/ubuntu/.ssh
            sudo -u ubuntu chmod 700 /home/ubuntu/.ssh

            echo '>>> Checking for swap space...'
            # Check if swap is active or swapfile exists
            if [ ! -f /swapfile ]; then
              echo '>>> Creating 2GB swap file...'
              dd if=/dev/zero of=/swapfile bs=128M count=16
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' | tee -a /etc/fstab
              echo '>>> Swap created and activated.'
            else
              echo '>>> Swap file already exists.'
            fi

            aws secretsmanager get-secret-value --region ${{ env.AWS_REGION }} --secret-id ${{ env.SECRET_NAME }} --query SecretString --output text | sudo -u ubuntu tee /home/ubuntu/.ssh/id_rsa > /dev/null
            sudo -u ubuntu chmod 600 /home/ubuntu/.ssh/id_rsa

            echo '>>> Testing GitHub connection...'
            sudo -u ubuntu ssh-keyscan -t rsa github.com >> /home/ubuntu/.ssh/known_hosts 2>/dev/null || true
            sudo -u ubuntu ssh -o StrictHostKeyChecking=no -T git@github.com || true

            if [ ! -d $PROJECT_DIR ]; then
              echo '>>> Cloning repository...'
              sudo -u ubuntu GIT_SSH_COMMAND='ssh -i /home/ubuntu/.ssh/id_rsa -o StrictHostKeyChecking=no' git clone git@github.com:TectopiaPeru/candidato-ai-orbe-speech.git $PROJECT_DIR
            fi

            # Fix permissions just in case
            chown -R ubuntu:ubuntu $PROJECT_DIR

            cd $PROJECT_DIR
            echo '>>> Updating code...'
            sudo -u ubuntu GIT_SSH_COMMAND='ssh -i /home/ubuntu/.ssh/id_rsa -o StrictHostKeyChecking=no' git fetch --all
            sudo -u ubuntu GIT_SSH_COMMAND='ssh -i /home/ubuntu/.ssh/id_rsa -o StrictHostKeyChecking=no' git reset --hard origin/main

            echo '>>> Cleaning up old Docker resources...'
            sudo -u ubuntu docker image prune -f || true

            echo '>>> Creating network if not exists...'
            sudo -u ubuntu docker network create app_candidato_network 2>/dev/null || true

            echo '>>> Preparing Docker build cache...'
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            sudo -u ubuntu docker pull python:3.13-slim || true

            echo '>>> Building Docker image...'
            sudo -u ubuntu -E docker compose -f docker-compose.production.yml build

            echo '>>> Starting containers...'
            sudo -u ubuntu -E docker compose -f docker-compose.production.yml up -d --remove-orphans

            sleep 10
            echo '>>> Checking container status...'
            sudo -u ubuntu docker compose -f docker-compose.production.yml ps

            sudo -u ubuntu docker image prune -f
            echo '>>> Deployment complete!'
          "

          PAYLOAD=$(jq -n --arg cmd "$COMMAND" --arg id "$INSTANCE_ID" '{
            "InstanceIds": [$id],
            "DocumentName": "AWS-RunShellScript",
            "Parameters": {"commands": [$cmd]},
            "TimeoutSeconds": 900
          }')

          echo "Sending SSM Command..."
          COMMAND_ID=$(aws ssm send-command --cli-input-json "$PAYLOAD" --region ${{ env.AWS_REGION }} --query "Command.CommandId" --output text)

          echo "Command ID: $COMMAND_ID"
          
          STATUS="Pending"
          COUNTER=0
          while [[ "$STATUS" == "Pending" || "$STATUS" == "InProgress" || "$STATUS" == "Delayed" ]]; do
            sleep 10
            COUNTER=$((COUNTER + 1))
            if [ $COUNTER -gt 60 ]; then
              echo "ERROR: Timeout after 10 minutes"
              exit 1
            fi
            STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
            echo "Status: $STATUS (waited ${COUNTER}0s)"
          done

          echo "========================================================"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text

          if [ "$STATUS" != "Success" ]; then
            echo "========================================================"
            echo "ERROR OUTPUT:"
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
            echo "Deploy Failed with status: $STATUS"
            exit 1
          fi

          echo "Deploy Success!"
