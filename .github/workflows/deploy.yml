name: Deploy to Amazon EC2 (via SSM)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_DIR: "/home/ubuntu/app"
  SECRET_NAME: "candidato-orbe-speech-deploy-key"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::971422696764:role/candidato-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via AWS SSM
        timeout-minutes: 15
        run: |
          INSTANCE_ID="${{ secrets.ORBE_SPEECH_INSTANCE_ID }}"
          PROJECT_DIR="${{ env.PROJECT_DIR }}"

          echo "Deploying to Instance: $INSTANCE_ID"

          COMMAND="
            set -e
            
            # 1. Create network if needed
            echo '=== Checking Docker network...'
            docker network inspect app_candidato_network >/dev/null 2>&1 || docker network create app_candidato_network
            
            # 2. Free up disk space aggressively
            echo '=== Freeing disk space...'
            docker system prune -a -f --volumes 2>/dev/null || true
            docker image prune -a -f 2>/dev/null || true
            rm -rf /tmp/* 2>/dev/null || true
            df -h | grep -E '(/dev/|Filesystem)'
            
            # 3. Create project directory if needed
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR
            
            # 4. Update code
            echo '=== Pulling latest code...'
            export HOME=/home/ubuntu
            git config --global --add safe.directory $PROJECT_DIR
            git fetch origin
            git reset --hard origin/main
            
            # 5. Build and start (Build on server)
            echo '=== Building and starting container...'
            docker compose -f docker-compose.production.yml up -d --build --remove-orphans
            
            # 6. Clean up
            docker image prune -f 2>/dev/null || true
            
            echo '=== Checking status...'
            docker ps | grep orbe-speech || echo 'Container not running!'
            echo 'DEPLOY_COMPLETE'
          "

          PAYLOAD=$(jq -n --arg cmd "$COMMAND" --arg id "$INSTANCE_ID" '{
            "InstanceIds": [$id],
            "DocumentName": "AWS-RunShellScript",
            "Parameters": {"commands": [$cmd]},
            "TimeoutSeconds": 900
          }')

          echo "Sending SSM Command..."
          COMMAND_ID=$(aws ssm send-command --cli-input-json "$PAYLOAD" --region ${{ env.AWS_REGION }} --query "Command.CommandId" --output text)

          echo "Command ID: $COMMAND_ID"
          
          STATUS="Pending"
          COUNTER=0
          while [[ "$STATUS" == "Pending" || "$STATUS" == "InProgress" || "$STATUS" == "Delayed" ]]; do
            sleep 10
            COUNTER=$((COUNTER + 1))
            if [ $COUNTER -gt 60 ]; then
              echo "ERROR: Timeout after 10 minutes"
              exit 1
            fi
            STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
            echo "Status: $STATUS (waited ${COUNTER}0s)"
          done

          echo "========================================================"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text

          if [ "$STATUS" != "Success" ]; then
            echo "========================================================"
            echo "ERROR OUTPUT:"
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
            echo "Deploy Failed with status: $STATUS"
            exit 1
          fi

          echo "Deploy Success!"