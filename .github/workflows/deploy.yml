name: Deploy to Amazon EC2 (via SSM)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_DIR: "/home/ubuntu/app"
  SECRET_NAME: "candidato-orbe-speech-deploy-key"
  IMAGE_REPO: "tectopia/candidato-ai-orbe-speech"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ env.IMAGE_REPO }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache,mode=max

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::971422696764:role/candidato-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via AWS SSM
        timeout-minutes: 15
        run: |
          INSTANCE_ID="${{ secrets.ORBE_SPEECH_INSTANCE_ID }}"
          PROJECT_DIR="${{ env.PROJECT_DIR }}"
          IMAGE_URI="${{ env.IMAGE_REPO }}:${{ github.sha }}"

          echo "Deploying to Instance: $INSTANCE_ID"
          echo "Deploying image: $IMAGE_URI"

          COMMAND="
            set -e

            echo '>>> Ensuring project directory exists...'
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            echo '>>> Creating network if not exists...'
            docker network create app_candidato_network 2>/dev/null || true

            echo '>>> Writing runtime environment...'
            cat > .env << EOF
            IMAGE_URI=${IMAGE_URI}
            EOF

            echo '>>> Pulling image...'
            docker pull ${IMAGE_URI}

            echo '>>> Starting containers...'
            docker compose -f docker-compose.production.yml up -d --remove-orphans --force-recreate

            sleep 10
            echo '>>> Checking container status...'
            docker compose -f docker-compose.production.yml ps

            docker image prune -f || true
            echo '>>> Deployment complete!'
          "

          PAYLOAD=$(jq -n --arg cmd "$COMMAND" --arg id "$INSTANCE_ID" '{
            "InstanceIds": [$id],
            "DocumentName": "AWS-RunShellScript",
            "Parameters": {"commands": [$cmd]},
            "TimeoutSeconds": 900
          }')

          echo "Sending SSM Command..."
          COMMAND_ID=$(aws ssm send-command --cli-input-json "$PAYLOAD" --region ${{ env.AWS_REGION }} --query "Command.CommandId" --output text)

          echo "Command ID: $COMMAND_ID"
          
          STATUS="Pending"
          COUNTER=0
          while [[ "$STATUS" == "Pending" || "$STATUS" == "InProgress" || "$STATUS" == "Delayed" ]]; do
            sleep 10
            COUNTER=$((COUNTER + 1))
            if [ $COUNTER -gt 60 ]; then
              echo "ERROR: Timeout after 10 minutes"
              exit 1
            fi
            STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
            echo "Status: $STATUS (waited ${COUNTER}0s)"
          done

          echo "========================================================"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text

          if [ "$STATUS" != "Success" ]; then
            echo "========================================================"
            echo "ERROR OUTPUT:"
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
            echo "Deploy Failed with status: $STATUS"
            exit 1
          fi

          echo "Deploy Success!"
