name: Deploy to Amazon EC2 (via SSM)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_DIR: "/home/ubuntu/app"
  SECRET_NAME: "candidato-orbe-speech-deploy-key"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::971422696764:role/candidato-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via AWS SSM
        timeout-minutes: 40
        run: |
          INSTANCE_ID="${{ secrets.ORBE_SPEECH_INSTANCE_ID }}"
          PROJECT_DIR="${{ env.PROJECT_DIR }}"
          SECRET_NAME="${{ env.SECRET_NAME }}"

          echo "Deploying to Instance: $INSTANCE_ID"

          COMMAND="
            set -e
            
            # Ensure base tools
            if ! command -v aws >/dev/null 2>&1; then
              sudo DEBIAN_FRONTEND=noninteractive apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y awscli
            fi
            if ! command -v docker >/dev/null 2>&1; then
              sudo DEBIAN_FRONTEND=noninteractive apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose git jq
              sudo systemctl enable --now docker || true
              sudo usermod -aG docker ubuntu || true
            fi
            
            echo '>>> Configuring SSH access...'
            sudo -u ubuntu mkdir -p /home/ubuntu/.ssh
            sudo -u ubuntu chmod 700 /home/ubuntu/.ssh
            # Recuperar la clave (normalizar EOL y asegurar newline final)
            aws secretsmanager get-secret-value --region us-east-1 --secret-id $SECRET_NAME --query SecretString --output text | sudo -u ubuntu tee /home/ubuntu/.ssh/id_rsa.tmp > /dev/null
            sudo -u ubuntu /bin/sh -c \"tr -d '\r' < /home/ubuntu/.ssh/id_rsa.tmp > /home/ubuntu/.ssh/id_rsa\"
            sudo -u ubuntu /bin/sh -c \"printf '\n' >> /home/ubuntu/.ssh/id_rsa\"
            sudo rm -f /home/ubuntu/.ssh/id_rsa.tmp
            sudo -u ubuntu chmod 600 /home/ubuntu/.ssh/id_rsa
            sudo chown -R ubuntu:ubuntu /home/ubuntu/.ssh
            
            # Probar conexión a GitHub
            echo '>>> Testing GitHub connection...'
            sudo touch /home/ubuntu/.ssh/known_hosts
            sudo chown ubuntu:ubuntu /home/ubuntu/.ssh/known_hosts
            sudo -u ubuntu ssh-keyscan -H -t rsa github.com | sudo -u ubuntu tee -a /home/ubuntu/.ssh/known_hosts >/dev/null || true
            sudo -u ubuntu ssh -o StrictHostKeyChecking=no -T git@github.com || true

            if [ ! -d $PROJECT_DIR ]; then
              echo '>>> Cloning repository...'
              sudo -u ubuntu GIT_SSH_COMMAND='ssh -i /home/ubuntu/.ssh/id_rsa -o StrictHostKeyChecking=no' git clone git@github.com:TectopiaPeru/candidato-ai-orbe-speech.git $PROJECT_DIR
            fi

            cd $PROJECT_DIR
            echo '>>> Updating code...'
            # Asegurar propiedad del directorio
            sudo chown -R ubuntu:ubuntu $PROJECT_DIR
            
            sudo -u ubuntu GIT_SSH_COMMAND='ssh -i /home/ubuntu/.ssh/id_rsa -o StrictHostKeyChecking=no' git config --global --add safe.directory $PROJECT_DIR
            sudo -u ubuntu GIT_SSH_COMMAND='ssh -i /home/ubuntu/.ssh/id_rsa -o StrictHostKeyChecking=no' git fetch --all
            sudo -u ubuntu GIT_SSH_COMMAND='ssh -i /home/ubuntu/.ssh/id_rsa -o StrictHostKeyChecking=no' git reset --hard origin/main

            # Ensure enough memory for build (Create 4GB swap if not exists - optimized for ML models)
            if ! swapon --show | grep -q '/swapfile'; then
              echo '>>> Creating 4GB swap file to prevent OOM during build...'
              if [ ! -f /swapfile ]; then
                sudo fallocate -l 4G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
                sudo chmod 600 /swapfile
                sudo mkswap /swapfile
              fi
              sudo swapon /swapfile
            fi

            # Clean up before building to free up space/memory
            echo '>>> Cleaning up old Docker resources...'
            sudo docker system prune -f --volumes || true
 
            echo '>>> Creating network if not exists...'
            sudo docker network create app_politicai_network 2>/dev/null || true
            # Detect if rebuild is needed (dependencies or Dockerfile changed)
            echo '>>> Checking if rebuild is needed...'
            cd $PROJECT_DIR
            NEEDS_REBUILD=false
            # Check if any infra files changed in the last commit
            if sudo -u ubuntu git diff HEAD~1 HEAD --name-only | grep -E '^(requirements/|Dockerfile|docker-compose)'; then
              echo 'Dependencies or Docker config changed - full rebuild required'
              NEEDS_REBUILD=true
            else
              echo 'Only code changed - performing lightweight restart (volume mounted)'
            fi

            if [ \"$NEEDS_REBUILD\" = true ]; then
              echo '>>> Rebuilding and starting Docker containers...'
              sudo docker-compose -f docker-compose.production.yml up -d --build --remove-orphans
            else
              echo '>>> Updating code on host and restarting service...'
              # Si no hay contenedores creados aún, arrancar en vez de reiniciar
              if [ -z \"\$(sudo docker-compose -f docker-compose.production.yml ps -q)\" ]; then
                echo 'No containers found - starting services...'
                sudo docker-compose -f docker-compose.production.yml up -d --build --remove-orphans
              else
                sudo docker-compose -f docker-compose.production.yml restart
              fi
            fi

            # Wait for health status
            echo '>>> Waiting for container to be healthy...'
            MAX_RETRIES=24
            RETRY_COUNT=0
            HEALTH_STATUS=\"starting\"

            while [ \$RETRY_COUNT -lt \$MAX_RETRIES ]; do
              CONTAINER_NAME=\"candidato_orbe_speech\"
              HEALTH_STATUS=\$(sudo docker inspect --format='{{.State.Health.Status}}' \$CONTAINER_NAME 2>/dev/null || echo \"not-found\")
              RUNNING=\$(sudo docker inspect --format='{{.State.Running}}' \$CONTAINER_NAME 2>/dev/null || echo \"false\")

              echo \"Status: \$HEALTH_STATUS (Running: \$RUNNING)\"

              if [ \"\$HEALTH_STATUS\" == \"healthy\" ]; then
                echo \"✅ Container is healthy!\"
                break
              fi

              if [ \"\$HEALTH_STATUS\" == \"unhealthy\" ]; then
                echo \"❌ Container is UNHEALTHY. Fetching logs...\"
                sudo docker logs \$CONTAINER_NAME | tail -n 100
                exit 1
              fi

              if [ \"\$RUNNING\" != \"true\" ]; then
                if [ \$RETRY_COUNT -gt 5 ]; then
                  echo \"❌ Container is NOT RUNNING. Fetching logs...\"
                  sudo docker logs \$CONTAINER_NAME | tail -n 100
                  exit 1
                fi
              fi

              RETRY_COUNT=\$((RETRY_COUNT+1))
              sleep 10
            done

            if [ \"\$HEALTH_STATUS\" != \"healthy\" ]; then
              echo \"❌ Timeout: Container did not become healthy within 240 seconds.\"
              sudo docker logs candidato_orbe_speech | tail -n 100
              exit 1
            fi

            sudo docker image prune -f
            echo '>>> Deployment complete!'
          "

          # Usamos jq para escapar el comando JSON de forma segura
          PAYLOAD=$(jq -n --arg cmd "$COMMAND" --arg id "$INSTANCE_ID" '
          {
            "InstanceIds": [$id],
            "DocumentName": "AWS-RunShellScript",
            "TimeoutSeconds": 3600,
            "Parameters": {
              "commands": [$cmd]
            }
          }')

          echo "Sending SSM Command..."
          COMMAND_ID=$(aws ssm send-command \
            --cli-input-json "$PAYLOAD" \
            --region ${{ env.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Wait for command execution
          echo "Waiting for execution..."
          STATUS="Pending"
          COUNTER=0
          while [[ "$STATUS" == "Pending" || "$STATUS" == "InProgress" || "$STATUS" == "Delayed" ]]; do
            sleep 10
            COUNTER=$((COUNTER + 1))
            if [ $COUNTER -gt 120 ]; then
              echo "ERROR: Timeout after 20 minutes"
              exit 1
            fi
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)
            echo "Status: $STATUS (waited ${COUNTER}0s)"
          done

          # Get Output
          echo "========================================================"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text

          if [ "$STATUS" != "Success" ]; then
            echo "========================================================"
            echo "ERROR OUTPUT:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text
            echo "Deploy Failed with status: $STATUS"
            exit 1
          fi

          echo "Deploy Success!"
