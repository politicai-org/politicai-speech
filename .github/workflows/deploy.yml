name: Deploy to Amazon EC2 (via SSM)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_DIR: "/home/ubuntu/app"
  SECRET_NAME: "candidato-orbe-speech-deploy-key"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::971422696764:role/candidato-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via AWS SSM
        run: |
          INSTANCE_ID="${{ secrets.ORBE_SPEECH_INSTANCE_ID }}"
          
          COMMAND="
            set -e # Detenerse si algo falla
            
            # Configurar clave SSH desde Secrets Manager (Gestionado por IAM)
            if [ ! -f /home/ubuntu/.ssh/id_rsa ]; then
              echo 'Configuring SSH Key from Secrets Manager...'
              sudo -u ubuntu mkdir -p /home/ubuntu/.ssh
              sudo -u ubuntu chmod 700 /home/ubuntu/.ssh
              aws secretsmanager get-secret-value --region ${{ env.AWS_REGION }} --secret-id ${{ env.SECRET_NAME }} --query SecretString --output text | sudo -u ubuntu tee /home/ubuntu/.ssh/id_rsa > /dev/null
              sudo -u ubuntu chmod 600 /home/ubuntu/.ssh/id_rsa
              # Evitar el prompt interactivo de GitHub host key
              sudo -u ubuntu ssh-keyscan -t rsa github.com >> /home/ubuntu/.ssh/known_hosts
            fi

            # Limpiar si la carpeta existe pero está vacía o dañada
            if [ -d ${{ env.PROJECT_DIR }} ] && [ ! -d ${{ env.PROJECT_DIR }}/.git ]; then
              echo 'Cleaning empty or corrupted project directory...'
              sudo rm -rf ${{ env.PROJECT_DIR }}
            fi

            if [ ! -d ${{ env.PROJECT_DIR }} ]; then
              echo 'Cloning repository...'
              sudo -u ubuntu mkdir -p ${{ env.PROJECT_DIR }}
              # Clonar usando SSH
              sudo -u ubuntu git clone git@github.com:TectopiaPeru/colchado-nacion.git ${{ env.PROJECT_DIR }}
            fi

            cd ${{ env.PROJECT_DIR }}
            echo 'Updating code...'
            sudo -u ubuntu git fetch --all
            sudo -u ubuntu git reset --hard origin/main
            
            # Construir localmente en la instancia
            echo 'Building with Docker Compose...'
            cd ${{ env.PROJECT_DIR }}/orbe-speech
            sudo -u ubuntu docker compose up -d --build
            sudo -u ubuntu docker image prune -f
            
            echo 'Deployment successful!'
          "

          PAYLOAD=$(jq -n --arg cmd "$COMMAND" --arg id "$INSTANCE_ID" '
          {
            "InstanceIds": [$id],
            "DocumentName": "AWS-RunShellScript",
            "Parameters": {
              "commands": [$cmd]
            }
          }')

          COMMAND_ID=$(aws ssm send-command \
            --cli-input-json "$PAYLOAD" \
            --region ${{ env.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          STATUS="Pending"
          while [[ "$STATUS" == "Pending" || "$STATUS" == "InProgress" || "$STATUS" == "Delayed" ]]; do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)
            echo "Status: $STATUS"
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text

          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
